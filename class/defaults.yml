parameters:
  csi_driver_smb:
    =_metadata:
      multi_tenant: true
    namespace: kube-system

    charts:
      csi-driver-smb:
        source: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-smb/master/charts
        version: 1.20.1

    helmValues:
      serviceAccount:
        create: true
        controller: csi-smb-controller-sa
        node: csi-smb-node-sa
      feature:
        enableInlineVolume: false

    volumes: []

    defaultMountOptions:
      - dir_mode=0777
      - file_mode=0777
      - vers=3.0

    pvTemplate:
      spec:
        capacity:
          storage: 100Gi
        accessModes:
          - ReadWriteMany
        persistentVolumeReclaimPolicy: Retain
        mountOptions: '${csi_driver_smb:defaultMountOptions}'
        csi:
          driver: smb.csi.k8s.io

    pvcTemplate:
      spec:
        accessModes:
          - ReadWriteMany
        resources:
          requests:
            storage: 100Gi
        volumeMode: Filesystem
